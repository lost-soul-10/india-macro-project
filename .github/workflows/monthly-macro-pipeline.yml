name: Monthly Macro Pipeline

on:
  workflow_dispatch:
  schedule:
    # Try on the 21st-25th at 01:30 UTC, continue only on the true last day
    - cron: "30 1 21-25 * *"

jobs:
  run-monthly-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      #FRED market data
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # CPI Excel configuration
      CPI_EXCEL_PATH: data/cpi_data.xlsx
      CPI_BREAK_DATE: ${{ secrets.CPI_BREAK_DATE }}
      OLD_CPI_BASE_YEAR: ${{ secrets.OLD_CPI_BASE_YEAR }}
      NEW_CPI_BASE_YEAR: ${{ secrets.NEW_CPI_BASE_YEAR }}

      # Regime scoring configuration
      EARLY_MIN_PERIODS: ${{ secrets.EARLY_MIN_PERIODS }}
      LATEST_ALLOWED_DATE: ${{ secrets.LATEST_ALLOWED_DATE }}
      WPI_BREAK_DATE: ${{ secrets.WPI_BREAK_DATE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check if today is the last day of the month
        id: month_end_check
        run: |
          TOMORROW_DAY=$(date -u -d "tomorrow" +%d)
          if [ "$TOMORROW_DAY" = "01" ]; then
            echo "is_last_day=true" >> $GITHUB_OUTPUT
            echo "Today is the last day of the month. Continuing."
          else
            echo "is_last_day=false" >> $GITHUB_OUTPUT
            echo "Today is not the last day of the month."
          fi

      - name: Stop scheduled runs if not month end
        if: github.event_name == 'schedule' && steps.month_end_check.outputs.is_last_day != 'true'
        run: |
          echo "Scheduled run skipped because today is not month end."
          exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Enable legacy OpenSSL server connect for MOSPI
        run: |
          cat > openssl_legacy.cnf <<'EOF'
          openssl_conf = openssl_init

          [openssl_init]
          ssl_conf = ssl_sect

          [ssl_sect]
          system_default = system_default_sect

          [system_default_sect]
          Options = UnsafeLegacyServerConnect
          EOF
          echo "OPENSSL_CONF=$GITHUB_WORKSPACE/openssl_legacy.cnf" >> $GITHUB_ENV

      - name: Show Python and OpenSSL
        run: |
          python --version
          python -c "import ssl, os; print(ssl.OPENSSL_VERSION)"
          python -c "import os; print('OPENSSL_CONF =', os.getenv('OPENSSL_CONF'))"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------
      # Load / fetch raw data
      # -------------------------

      - name: Load CPI data from Excel
        run: python scripts/fetch_cpi_mospi.py

      - name: Fetch GDP data from MOSPI
        env:
          MOSPI_EMAIL: ${{ secrets.MOSPI_EMAIL }}
          MOSPI_PASSWORD: ${{ secrets.MOSPI_PASSWORD }}
        run: python scripts/fetch_gdp_mospi.py

      - name: Load GST data from Excel
        run: python scripts/fetch_gst_collections_revenue.py

      - name: Fetch IIP data from MOSPI
        env:
          MOSPI_EMAIL: ${{ secrets.MOSPI_EMAIL }}
          MOSPI_PASSWORD: ${{ secrets.MOSPI_PASSWORD }}
        run: python scripts/fetch_iip_mospi.py

      - name: Fetch WPI data from MOSPI
        env:
          MOSPI_EMAIL: ${{ secrets.MOSPI_EMAIL }}
          MOSPI_PASSWORD: ${{ secrets.MOSPI_PASSWORD }}
        run: python scripts/fetch_wpi_mospi.py

      - name: Fetch repo rate data from RBI
        run: python scripts/fetch_repo_rate_rbi.py

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      # -------------------------
      # Build macro features
      # -------------------------

      - name: Build CPI features
        run: python scripts/build_cpi_features.py

      - name: Build GDP features
        run: python scripts/build_gdp_features.py

      - name: Build GST features
        run: python scripts/build_gst.py

      - name: Build IIP features
        run: python scripts/build_iip_features.py

      - name: Build WPI features
        run: python scripts/build_wpi_features.py

      - name: Build repo rate features
        run: python scripts/build_repo_features.py

      - name: Build market data features
        run: python scripts/build_market_data_features.py

      # -------------------------
      # Compute final regime output
      # -------------------------

      - name: Compute regime snapshots
        run: python scripts/compute_regime_snapshots.py
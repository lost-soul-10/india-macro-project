name: Monthly Macro Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 16 * *'

jobs:
  run-monthly-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WPI fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          MOSPI_EMAIL: ${{ secrets.MOSPI_EMAIL }}
          MOSPI_PASSWORD: ${{ secrets.MOSPI_PASSWORD }}
        run: python scripts/fetch_wpi_mospi.py

      - name: Build WPI features
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          MOSPI_EMAIL: ${{ secrets.MOSPI_EMAIL }}
          MOSPI_PASSWORD: ${{ secrets.MOSPI_PASSWORD }}
        run: python scripts/build_wpi_features.py
